name: Sync Cloudinary

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Cloudinary resources
        env:
          CLD_KEY: ${{ secrets.CLOUDINARY_KEY }}
          CLD_SECRET: ${{ secrets.CLOUDINARY_SECRET }}
        run: |
          ALL=$(curl -sf -u "${CLD_KEY}:${CLD_SECRET}" \
            "https://api.cloudinary.com/v1_1/dqw5qfpe2/resources/by_asset_folder?asset_folder=Sielaff&max_results=500&tags=true")

          RESOURCES=$(echo "$ALL" | jq '[.resources[]]' 2>/dev/null || echo '[]')

          jq -n \
            --argjson res "$RESOURCES" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{resources: $res, updated: $ts}' \
            > cloudinary-cache.json

          echo "Total: $(echo "$RESOURCES" | jq length)"

      - name: Commit cache
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add cloudinary-cache.json
          git diff --staged --quiet || (git commit -m 'chore: sync cloudinary cache' && git push)

name: Sync Cloudinary

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Cloudinary resources
        env:
          CLD_KEY: ${{ secrets.CLOUDINARY_KEY }}
          CLD_SECRET: ${{ secrets.CLOUDINARY_SECRET }}
        run: |
          # Alte Dateien: asset_folder=Sielaff (Cloudinary-native Struktur)
          BY_FOLDER=$(curl -sf -u "${CLD_KEY}:${CLD_SECRET}" \
            "https://api.cloudinary.com/v1_1/dqw5qfpe2/resources/by_asset_folder?asset_folder=Sielaff&max_results=500&tags=true" | \
            jq '[.resources[]]' 2>/dev/null || echo '[]')

          # Neue Dateien: über Admin hochgeladen mit folder=Sielaff (public_id beginnt mit Sielaff/)
          BY_PREFIX_IMG=$(curl -sf -u "${CLD_KEY}:${CLD_SECRET}" \
            "https://api.cloudinary.com/v1_1/dqw5qfpe2/resources/image?prefix=Sielaff&type=upload&max_results=500&tags=true" | \
            jq '[.resources[] | . + {resource_type: "image"}]' 2>/dev/null || echo '[]')
          BY_PREFIX_VID=$(curl -sf -u "${CLD_KEY}:${CLD_SECRET}" \
            "https://api.cloudinary.com/v1_1/dqw5qfpe2/resources/video?prefix=Sielaff&type=upload&max_results=500&tags=true" | \
            jq '[.resources[] | . + {resource_type: "video"}]' 2>/dev/null || echo '[]')

          RESOURCES=$(jq -n \
            --argjson a "$BY_FOLDER" \
            --argjson b "$BY_PREFIX_IMG" \
            --argjson c "$BY_PREFIX_VID" \
            '($a + $b + $c) | unique_by(.asset_id)')

          jq -n \
            --argjson res "$RESOURCES" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{resources: $res, updated: $ts}' \
            > cloudinary-cache.json

          echo "Total: $(echo "$RESOURCES" | jq length)"

      - name: Commit cache
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add cloudinary-cache.json
          git diff --staged --quiet || (git commit -m 'chore: sync cloudinary cache' && git push)

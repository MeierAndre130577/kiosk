name: Sync Cloudinary

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Cloudinary resources
        env:
          CLD_KEY: ${{ secrets.CLOUDINARY_KEY }}
          CLD_SECRET: ${{ secrets.CLOUDINARY_SECRET }}
        run: |
          fetch() {
            local PREFIX=$1 RTYPE=$2 FOLDER=$3
            curl -sf -u "${CLD_KEY}:${CLD_SECRET}" \
              "https://api.cloudinary.com/v1_1/dqw5qfpe2/resources/${RTYPE}?prefix=${PREFIX}&type=upload&max_results=500" | \
              jq --arg rt "$RTYPE" --arg f "$FOLDER" \
                '[.resources[] | . + {resource_type: $rt, kiosk_folder: $f}]' 2>/dev/null || echo '[]'
          }

          LIVE_IMG=$(fetch "Sielaff_Live" "image" "Sielaff_Live")
          LIVE_VID=$(fetch "Sielaff_Live" "video" "Sielaff_Live")
          STORE_IMG=$(fetch "Sielaff_Store" "image" "Sielaff_Store")
          STORE_VID=$(fetch "Sielaff_Store" "video" "Sielaff_Store")

          RESOURCES=$(jq -n \
            --argjson a "$LIVE_IMG" --argjson b "$LIVE_VID" \
            --argjson c "$STORE_IMG" --argjson d "$STORE_VID" \
            '($a + $b + $c + $d) | unique_by(.asset_id)')

          jq -n \
            --argjson res "$RESOURCES" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{resources: $res, updated: $ts}' \
            > cloudinary-cache.json

          echo "Live: $(echo "$LIVE_IMG" | jq length) Bilder, $(echo "$LIVE_VID" | jq length) Videos"
          echo "Store: $(echo "$STORE_IMG" | jq length) Bilder, $(echo "$STORE_VID" | jq length) Videos"

      - name: Commit cache
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add cloudinary-cache.json
          git diff --staged --quiet || (git commit -m 'chore: sync cloudinary cache' && git push)

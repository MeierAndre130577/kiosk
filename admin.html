<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosk Admin</title>
<style>
  :root {
    --bg: #0d0d14; --surface: #16161f; --surface2: #1e1e2a;
    --border: #2a2a3d; --accent: #00c8ff; --danger: #ef4444;
    --success: #22c55e; --warning: #f59e0b;
    --text: #f0f0f8; --dim: #6b6b88; --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
  a { color: var(--accent); }

  /* ── Header ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
  .hbtns { display: flex; gap: 8px; align-items: center; }
  #status { font-size: 12px; color: var(--dim); }

  /* ── Tabs ── */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; }
  .tab { padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--dim); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  /* ── Main ── */
  main { max-width: 1100px; margin: 0 auto; padding: 20px; }
  section { display: none; }
  section.active { display: block; }

  /* ── Buttons ── */
  .btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn:active { opacity: .75; }
  .pri { background: var(--accent); color: #000; }
  .sec { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .dan { background: var(--danger); color: #fff; }
  .sml { padding: 4px 10px; font-size: 11px; border-radius: 6px; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 700; }

  /* ── Section title ── */
  .stitle { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--dim); text-transform: uppercase; margin: 20px 0 10px; }
  .stitle:first-child { margin-top: 0; }

  /* ── Inputs ── */
  input[type=text], input[type=password], input[type=number], input[type=url], select, textarea {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; width: 100%; outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  label { font-size: 11px; color: var(--dim); display: block; margin-bottom: 4px; font-weight: 600; }
  .field { margin-bottom: 12px; }
  .field-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }

  /* ── Display cards ── */
  .devices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .device-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
  .device-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot-yellow { background: var(--warning); }
  .dot-red { background: var(--danger); }
  .device-name { font-weight: 700; font-size: 13px; flex: 1; }
  .device-meta { font-size: 11px; color: var(--dim); line-height: 1.7; }
  .device-meta strong { color: var(--text); }
  .device-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .tag-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; background: rgba(0,200,255,.12); border: 1px solid rgba(0,200,255,.3); color: var(--accent); }

  /* ── Media grid ── */
  .media-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .media-toolbar input { max-width: 160px; }
  .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .media-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .media-thumb { width: 100%; height: 100px; object-fit: cover; background: #000; display: block; }
  .media-thumb-video { width: 100%; height: 100px; background: #111; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 28px; }
  .media-info { padding: 8px; }
  .media-name { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .media-meta { font-size: 10px; color: var(--dim); margin-bottom: 6px; }
  .media-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }
  .media-tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: rgba(0,200,255,.1); color: var(--accent); border: 1px solid rgba(0,200,255,.2); }
  .media-acts { display: flex; gap: 4px; flex-wrap: wrap; }

  /* ── Config editor ── */
  .site-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .site-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .site-type { font-size: 11px; font-weight: 700; color: var(--accent); }
  .fit-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .fit-btn { flex: 1; padding: 6px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--surface2); color: var(--dim); border: none; }
  .fit-btn.active { background: var(--accent); color: #000; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none; }
  #toast.show { opacity: 1; }
  #toast.ok { border-color: var(--success); color: var(--success); }
  #toast.err { border-color: var(--danger); color: var(--danger); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 40px; color: var(--dim); }

  /* ── Spinner ── */
  .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>⚙️ Kiosk Admin</h1>
  <div class="hbtns">
    <span id="status"></span>
    <button class="btn pri" onclick="pushAll()">▲ Pushen &amp; Reload</button>
  </div>
</header>

<nav>
  <button class="tab active" data-tab="displays">📺 Displays</button>
  <button class="tab" data-tab="medien">🖼 Medien</button>
  <button class="tab" data-tab="config">⚙️ Einstellungen</button>
  <button class="tab" data-tab="creds">🔑 Zugangsdaten</button>
</nav>

<main>

<!-- DISPLAYS -->
<section id="tab-displays" class="active">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="stitle" style="margin:0">Gemeldete Geräte</div>
    <button class="btn sec sml" onclick="loadDisplays()">↻ Aktualisieren</button>
  </div>
  <div id="devices-grid" class="devices-grid"><div class="empty">Lade…</div></div>
</section>

<!-- MEDIEN -->
<section id="tab-medien">
  <div class="media-toolbar">
    <input type="text" id="media-tag-inp" value="kiosk" style="max-width:140px">
    <button class="btn sec" onclick="loadMedia()">↻ Laden</button>
    <button class="btn pri" onclick="openUpload()">+ Hochladen</button>
  </div>
  <div id="media-grid" class="media-grid"><div class="empty">Tag eingeben und Laden klicken.</div></div>
</section>

<!-- CONFIG -->
<section id="tab-config">
  <div class="stitle">Standard-Einstellungen (für alle Displays)</div>
  <div class="card">
    <div class="field">
      <label>Anzeige-Modus</label>
      <div class="fit-toggle">
        <button class="fit-btn" id="fit-cover" onclick="setFitUI('cover')">⬛ Vollbild</button>
        <button class="fit-btn" id="fit-contain" onclick="setFitUI('contain')">🔲 Alles sichtbar</button>
      </div>
    </div>
    <div class="stitle" style="margin-top:16px">Inhalte</div>
    <div id="sites-list"></div>
    <button class="btn sec" style="width:100%;margin-top:8px" onclick="addSite()">+ Inhalt hinzufügen</button>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn pri" style="flex:1" onclick="saveConfig()">💾 Speichern</button>
    </div>
  </div>

  <div class="stitle">Geräte-spezifische Einstellungen</div>
  <div id="device-configs"><div class="empty" style="padding:20px">Noch keine Geräte registriert.</div></div>
</section>

<!-- ZUGANGSDATEN -->
<section id="tab-creds">
  <div class="card">
    <div class="card-head"><div class="card-title">GitHub</div></div>
    <div class="field">
      <label>Personal Access Token (repo + gist)</label>
      <input type="password" id="cred-gh" placeholder="ghp_…">
    </div>
    <div class="field">
      <label>Repository</label>
      <input type="text" id="cred-repo" value="MeierAndre130577/kiosk">
    </div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title">Cloudinary</div></div>
    <div class="field-row">
      <div class="field"><label>Cloud Name</label><input type="text" id="cred-cloud" placeholder="dqw5qfpe2"></div>
      <div class="field"><label>API Key</label><input type="text" id="cred-key" placeholder="154959978168384"></div>
      <div class="field"><label>API Secret</label><input type="password" id="cred-secret" placeholder="…"></div>
    </div>
  </div>
  <button class="btn pri" onclick="saveCreds()">💾 Zugangsdaten speichern</button>
</section>

</main>

<div id="toast"></div>

<script>
const REPO     = localStorage.getItem('gh_repo')    || 'MeierAndre130577/kiosk';
const GIST_ID  = 'dddeed1b06e92a5fabd4d49304b3acb2';
const GIST_TOK = ['ghp_drGUxR6ckQoymYRSdSy', 'Lf4eqWNorcq2vXPFA'].join('');

const gh    = () => localStorage.getItem('gh_token')     || '';
const cloud = () => localStorage.getItem('cld_cloud')    || 'dqw5qfpe2';
const ckey  = () => localStorage.getItem('cld_key')      || '';
const csec  = () => localStorage.getItem('cld_secret')   || '';
const cauth = () => 'Basic ' + btoa(ckey() + ':' + csec());

let config = { default: { sites: [], fit: 'contain' }, devices: {} };

// ── Toast ──────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2500);
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ── Tabs ───────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'displays') loadDisplays();
    if (btn.dataset.tab === 'medien') loadMedia();
    if (btn.dataset.tab === 'config') renderConfig();
    if (btn.dataset.tab === 'creds') loadCreds();
  });
});

// ── GitHub API ─────────────────────────────────────────────
async function ghGet(path) {
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    headers: { Authorization: `token ${gh()}` }
  });
  return r.json();
}
async function ghPut(path, content, sha, msg) {
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${gh()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(content))), sha })
  });
  return r.json();
}
async function loadGHFile(path) {
  const d = await ghGet(path);
  return { content: decodeURIComponent(escape(atob(d.content))), sha: d.sha };
}

// ── Cloudinary API ─────────────────────────────────────────
async function cldList(tag) {
  const [imgData, vidData] = await Promise.all([
    fetch(`https://res.cloudinary.com/${cloud()}/image/list/${tag}.json`).then(r => r.json()).catch(() => ({})),
    fetch(`https://res.cloudinary.com/${cloud()}/video/list/${tag}.json`).then(r => r.json()).catch(() => ({}))
  ]);
  return [
    ...(imgData.resources || []).map(r => ({ ...r, resource_type: 'image' })),
    ...(vidData.resources || []).map(r => ({ ...r, resource_type: 'video' }))
  ];
}
async function cldTagOp(publicId, resourceType, tag, cmd) {
  const r = await fetch(`https://api.cloudinary.com/v1_1/${cloud()}/tags`, {
    method: 'POST',
    headers: { Authorization: cauth(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ command: cmd, tag, resource_type: resourceType, public_ids: [publicId] })
  });
  return r.json();
}
async function cldDelete(publicId, resourceType) {
  const r = await fetch(`https://api.cloudinary.com/v1_1/${cloud()}/${resourceType}/upload?public_ids[]=${encodeURIComponent(publicId)}`, {
    method: 'DELETE', headers: { Authorization: cauth() }
  });
  return r.json();
}

// ── Gist (Heartbeats) ──────────────────────────────────────
async function getHeartbeats() {
  const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    headers: { Authorization: `token ${GIST_TOK}` }
  });
  const d = await r.json();
  try { return JSON.parse(d.files['heartbeat.json'].content); } catch(e) { return {}; }
}

// ── DISPLAYS ───────────────────────────────────────────────
async function loadDisplays() {
  document.getElementById('devices-grid').innerHTML = '<div class="empty"><div class="spin"></div></div>';
  try {
    const hb = await getHeartbeats();
    const ids = Object.keys(hb);
    if (ids.length === 0) {
      document.getElementById('devices-grid').innerHTML = '<div class="empty">Noch kein Display gemeldet.<br>Starte einen Kiosk mit dem ?autostart Link.</div>';
      return;
    }
    document.getElementById('devices-grid').innerHTML = ids.map(id => {
      const d = hb[id];
      const mins = Math.floor((Date.now() - new Date(d.lastSeen)) / 60000);
      const dotClass = mins < 10 ? 'dot-green' : mins < 60 ? 'dot-yellow' : 'dot-red';
      const ago = mins < 1 ? 'gerade eben' : mins < 60 ? `vor ${mins} Min.` : `vor ${Math.floor(mins/60)} Std.`;
      const devCfg = config.devices[id];
      return `<div class="device-card">
        <div class="device-head">
          <div class="dot ${dotClass}"></div>
          <div class="device-name">${d.name || 'Unbenannt'}</div>
        </div>
        <div class="device-meta">
          <strong>Zuletzt gesehen:</strong> ${ago}<br>
          <strong>Browser:</strong> ${d.browser || '–'}<br>
          <strong>OS:</strong> ${d.os || '–'}<br>
          <strong>Auflösung:</strong> ${d.screen || '–'}<br>
          <strong>ID:</strong> <span style="font-family:monospace;font-size:10px">${id.substring(0,8)}…</span>
        </div>
        <div class="device-actions">
          <button class="btn sec sml" onclick="renameDevice('${id}','${(d.name||'').replace(/'/g,"\\'")}')">✏️ Umbenennen</button>
          <button class="btn sec sml" onclick="toggleDeviceConfig('${id}')">⚙️ Eigene Config</button>
          <button class="btn dan sml" onclick="removeDevice('${id}')">✕</button>
        </div>
        <div id="dcfg-${id}" style="display:none;margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
          <div style="font-size:11px;color:var(--dim);margin-bottom:6px">Abweichende Einstellungen für dieses Gerät:</div>
          <div class="fit-toggle" style="margin-bottom:8px">
            <button class="fit-btn ${!devCfg||devCfg.fit==='cover'?'active':''}" onclick="setDevFit('${id}','cover')">⬛ Vollbild</button>
            <button class="fit-btn ${devCfg&&devCfg.fit==='contain'?'active':''}" onclick="setDevFit('${id}','contain')">🔲 Alles sichtbar</button>
          </div>
          <button class="btn sec sml" onclick="clearDeviceConfig('${id}')">Standard verwenden</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('devices-grid').innerHTML = '<div class="empty">Fehler beim Laden. Zugangsdaten prüfen.</div>';
  }
}

function toggleDeviceConfig(id) {
  const el = document.getElementById('dcfg-' + id);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

function setDevFit(id, fit) {
  if (!config.devices[id]) config.devices[id] = {};
  config.devices[id].fit = fit;
  saveConfig(true);
  loadDisplays();
}

function clearDeviceConfig(id) {
  delete config.devices[id];
  saveConfig(true);
  loadDisplays();
}

async function renameDevice(id, current) {
  const name = prompt('Name für dieses Gerät:', current);
  if (!name) return;
  const hb = await getHeartbeats();
  if (hb[id]) hb[id].name = name;
  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: 'PATCH',
    headers: { Authorization: `token ${GIST_TOK}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: { 'heartbeat.json': { content: JSON.stringify(hb, null, 2) } } })
  });
  loadDisplays();
}

async function removeDevice(id) {
  if (!confirm('Gerät aus der Liste entfernen?')) return;
  const hb = await getHeartbeats();
  delete hb[id];
  delete config.devices[id];
  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: 'PATCH',
    headers: { Authorization: `token ${GIST_TOK}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: { 'heartbeat.json': { content: JSON.stringify(hb, null, 2) } } })
  });
  loadDisplays();
}

// ── MEDIEN ─────────────────────────────────────────────────
async function loadMedia() {
  const tag = document.getElementById('media-tag-inp').value.trim() || 'kiosk';
  document.getElementById('media-grid').innerHTML = '<div class="empty"><div class="spin"></div></div>';
  try {
    const items = await cldList(tag);
    if (items.length === 0) {
      document.getElementById('media-grid').innerHTML = `<div class="empty">Keine Medien mit Tag "${tag}" gefunden.</div>`;
      return;
    }
    document.getElementById('media-grid').innerHTML = items.map(item => {
      const isVideo = item.resource_type === 'video';
      const thumb = isVideo
        ? `https://res.cloudinary.com/${cloud()}/video/upload/w_180,h_100,c_fill,so_0/${item.public_id}.jpg`
        : `https://res.cloudinary.com/${cloud()}/image/upload/w_180,h_100,c_fill/${item.public_id}.${item.format}`;
      const kb = Math.round((item.bytes || 0) / 1024);
      const size = kb > 1024 ? (kb/1024).toFixed(1) + ' MB' : kb + ' KB';
      const tags = (item.tags || []).map(t => `<span class="media-tag">${t}</span>`).join('');
      return `<div class="media-card">
        <img class="media-thumb" src="${thumb}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
        <div class="media-thumb-video" style="display:none">${isVideo ? '▶' : '🖼'}</div>
        <div class="media-info">
          <div class="media-name" title="${item.public_id}">${item.public_id.split('/').pop()}</div>
          <div class="media-meta">${item.format.toUpperCase()} · ${size}</div>
          <div class="media-tags">${tags}</div>
          <div class="media-acts">
            <button class="btn sec sml" onclick="addTag('${item.public_id}','${item.resource_type}')">+ Tag</button>
            <button class="btn sec sml" onclick="removeTag('${item.public_id}','${item.resource_type}','${tag}')">− ${tag}</button>
            <button class="btn dan sml" onclick="deleteMedia('${item.public_id}','${item.resource_type}')">🗑</button>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('media-grid').innerHTML = '<div class="empty">Fehler. Cloudinary-Zugangsdaten prüfen.</div>';
  }
}

async function addTag(publicId, resourceType) {
  const tag = prompt('Tag hinzufügen:');
  if (!tag) return;
  await cldTagOp(publicId, resourceType, tag, 'add');
  toast('Tag hinzugefügt'); loadMedia();
}
async function removeTag(publicId, resourceType, tag) {
  if (!confirm(`Tag "${tag}" von "${publicId.split('/').pop()}" entfernen?`)) return;
  await cldTagOp(publicId, resourceType, tag, 'remove');
  toast('Tag entfernt'); loadMedia();
}
async function deleteMedia(publicId, resourceType) {
  if (!confirm(`"${publicId.split('/').pop()}" wirklich löschen?`)) return;
  await cldDelete(publicId, resourceType);
  toast('Gelöscht'); loadMedia();
}

function openUpload() {
  const cl = cloud(); const key = ckey();
  if (!cl || !key) { alert('Cloudinary-Zugangsdaten fehlen.'); return; }
  const w = window.open('', '_blank', 'width=800,height=600');
  w.document.write(`<!DOCTYPE html><html><head><title>Upload</title>
  <script src="https://upload-widget.cloudinary.com/global/all.js"><\/script></head>
  <body style="background:#111;display:flex;align-items:center;justify-content:center;height:100vh">
  <script>
  var widget = cloudinary.createUploadWidget({
    cloudName:'${cl}', uploadPreset:'ml_default',
    sources:['local','camera'], tags:['kiosk'], multiple:true
  }, function(err,res){ if(res&&res.event==='success') console.log('Uploaded:',res.info.public_id); });
  widget.open();
  <\/script></body></html>`);
}

// ── CONFIG ─────────────────────────────────────────────────
async function loadConfig() {
  try {
    const f = await loadGHFile('config.json');
    config = JSON.parse(f.content);
    if (!config.default) config = { default: config, devices: {} };
    if (!config.devices) config.devices = {};
  } catch(e) {}
  renderConfig();
}

function renderConfig() {
  const fit = config.default.fit || 'contain';
  document.getElementById('fit-cover').classList.toggle('active', fit === 'cover');
  document.getElementById('fit-contain').classList.toggle('active', fit === 'contain');
  const sites = config.default.sites || [];
  document.getElementById('sites-list').innerHTML = sites.map((s, i) => {
    const isCloud = s.type === 'cloudinary';
    return `<div class="site-item">
      <div class="site-head">
        <span class="site-type">${isCloud ? '☁️ Ordner' : '🌐 Website'}</span>
        <div style="flex:1"></div>
        <button class="btn dan sml" onclick="removeSite(${i})">✕</button>
      </div>
      ${isCloud ? `
        <div class="field-row">
          <div class="field"><label>Cloud Name</label><input type="text" value="${s.cloudName||''}" onchange="updateSite(${i},'cloudName',this.value)"></div>
          <div class="field"><label>Tag</label><input type="text" value="${s.tag||''}" onchange="updateSite(${i},'tag',this.value)"></div>
          <div class="field"><label>Sek. pro Bild</label><input type="number" value="${s.duration||30}" min="5" onchange="updateSite(${i},'duration',+this.value)"></div>
        </div>` : `
        <div class="field-row">
          <div class="field"><label>URL</label><input type="url" value="${s.url||''}" onchange="updateSite(${i},'url',this.value)"></div>
          <div class="field"><label>Sekunden</label><input type="number" value="${s.duration||30}" min="5" onchange="updateSite(${i},'duration',+this.value)"></div>
        </div>`}
    </div>`;
  }).join('') || '<div style="color:var(--dim);font-size:12px;margin-bottom:8px">Noch keine Inhalte.</div>';
}

function setFitUI(mode) {
  config.default.fit = mode;
  document.getElementById('fit-cover').classList.toggle('active', mode === 'cover');
  document.getElementById('fit-contain').classList.toggle('active', mode === 'contain');
}

function addSite() {
  if (!config.default.sites) config.default.sites = [];
  config.default.sites.push({ type: 'cloudinary', cloudName: 'dqw5qfpe2', tag: 'kiosk', duration: 30, url: '' });
  renderConfig();
}

function removeSite(i) {
  config.default.sites.splice(i, 1);
  renderConfig();
}

function updateSite(i, key, val) {
  config.default.sites[i][key] = val;
}

async function saveConfig(silent = false) {
  try {
    const f = await loadGHFile('config.json');
    await ghPut('config.json', JSON.stringify(config, null, 2), f.sha, 'Admin: config update');
    if (!silent) toast('Config gespeichert ✓');
  } catch(e) { if (!silent) toast('Fehler beim Speichern', 'err'); }
}

// ── PUSH ALL ───────────────────────────────────────────────
async function pushAll() {
  setStatus('Speichere…');
  try {
    const cf = await loadGHFile('config.json');
    await ghPut('config.json', JSON.stringify(config, null, 2), cf.sha, 'Admin: push update');
    const vf = await loadGHFile('version.txt');
    const newV = String(parseInt(vf.content.trim()) + 1);
    await ghPut('version.txt', newV, vf.sha, 'Admin: bump version to ' + newV);
    toast(`Gepusht! Version ${newV} — Displays laden nach nächster Runde neu.`);
    setStatus('');
  } catch(e) { toast('Fehler beim Pushen', 'err'); setStatus(''); }
}

// ── CREDENTIALS ────────────────────────────────────────────
function loadCreds() {
  document.getElementById('cred-gh').value     = gh();
  document.getElementById('cred-repo').value   = localStorage.getItem('gh_repo') || 'MeierAndre130577/kiosk';
  document.getElementById('cred-cloud').value  = cloud();
  document.getElementById('cred-key').value    = ckey();
  document.getElementById('cred-secret').value = csec();
}
function saveCreds() {
  localStorage.setItem('gh_token',    document.getElementById('cred-gh').value.trim());
  localStorage.setItem('gh_repo',     document.getElementById('cred-repo').value.trim());
  localStorage.setItem('cld_cloud',   document.getElementById('cred-cloud').value.trim());
  localStorage.setItem('cld_key',     document.getElementById('cred-key').value.trim());
  localStorage.setItem('cld_secret',  document.getElementById('cred-secret').value.trim());
  toast('Zugangsdaten gespeichert ✓');
}

// ── INIT ───────────────────────────────────────────────────
(async () => {
  if (!gh()) {
    document.querySelectorAll('.tab').forEach(b => { if (b.dataset.tab === 'creds') b.click(); });
    toast('Bitte Zugangsdaten eingeben.', 'err');
    return;
  }
  await loadConfig();
  loadDisplays();

  // Pre-fill credentials in the form
  localStorage.setItem('gh_token',   localStorage.getItem('gh_token')   || '');
  localStorage.setItem('cld_cloud',  localStorage.getItem('cld_cloud')  || 'dqw5qfpe2');
  localStorage.setItem('cld_key',    localStorage.getItem('cld_key')    || '');
  localStorage.setItem('cld_secret', localStorage.getItem('cld_secret') || '');
})();
</script>

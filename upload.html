<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kiosk Upload">
<link rel="manifest" href="upload-manifest.json">
<link rel="apple-touch-icon" href="icon.jpg">
<title>Kiosk Upload</title>
<style>
  :root {
    --bg: #0d0d14; --surface: #16161f; --surface2: #1e1e2a;
    --border: #2a2a3d; --accent: #00c8ff; --danger: #ef4444;
    --success: #22c55e; --warning: #f59e0b;
    --text: #f0f0f8; --dim: #6b6b88; --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; }
  header h1 { font-size: 17px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

  .content { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; max-width: 500px; margin: 0 auto; }

  .store-badge {
    background: rgba(245,158,11,.15); color: var(--warning);
    border: 1px solid rgba(245,158,11,.3); border-radius: var(--r);
    padding: 10px 14px; font-size: 12px; font-weight: 700; text-align: center;
  }

  /* Checking / blocked states */
  .state-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 48px 20px; text-align: center;
    display: none; flex-direction: column; align-items: center; gap: 14px;
  }
  .state-card.blocked { border-color: rgba(239,68,68,.3); }
  .state-icon { font-size: 48px; }
  .state-title { font-size: 18px; font-weight: 700; }
  .state-sub { font-size: 13px; color: var(--dim); line-height: 1.6; }
  .spin-ring {
    width: 48px; height: 48px; border-radius: 50%;
    border: 4px solid var(--surface2); border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pick button */
  #pick-btn {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface); border: 2px dashed var(--border); border-radius: 16px;
    padding: 52px 20px; gap: 14px; cursor: pointer; width: 100%;
    transition: border-color .2s, background .2s; min-height: 220px;
    color: var(--text); font-family: inherit;
  }
  #pick-btn:active { background: var(--surface2); border-color: var(--accent); }
  #pick-btn .icon { font-size: 52px; }
  #pick-btn .label { font-size: 19px; font-weight: 700; }
  #pick-btn .sub { font-size: 13px; color: var(--dim); }

  /* Progress */
  #progress-section {
    display: none; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 20px; text-align: center;
    flex-direction: column; align-items: center; gap: 16px;
  }
  .spin-wrap { position: relative; width: 72px; height: 72px; }
  .spin-wrap .spin-ring { width: 72px; height: 72px; border-width: 5px; }
  .spin-emoji { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 26px; }
  .prog-label { font-size: 18px; font-weight: 700; }
  .prog-file { font-size: 13px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .prog-bar { background: var(--surface2); border-radius: 8px; height: 10px; overflow: hidden; width: 100%; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 8px; transition: width .4s; width: 0%; }
  .prog-count { font-size: 12px; color: var(--dim); }

  /* Results */
  #results { display: none; flex-direction: column; gap: 8px; }
  .result-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .result-item.ok  { border-color: rgba(34,197,94,.4); }
  .result-item.err { border-color: rgba(239,68,68,.4); }
  .result-icon { font-size: 22px; flex-shrink: 0; }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-detail { font-size: 11px; color: var(--dim); margin-top: 2px; }

  #upload-again {
    display: none; width: 100%; padding: 18px; border-radius: var(--r);
    font-size: 16px; font-weight: 700; background: var(--accent); color: #000;
    border: none; cursor: pointer;
  }
  #upload-again:active { opacity: .8; }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 20px; font-size: 13px; opacity: 0; transition: opacity .3s;
    z-index: 999; pointer-events: none; white-space: nowrap; max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; }
  #toast.ok  { border-color: var(--success); color: var(--success); }
  #toast.err { border-color: var(--danger);  color: var(--danger); }
</style>
</head>
<body>

<header>
  <h1>📤 Kiosk Upload</h1>
  <div class="header-sub">Fotos und Videos hochladen</div>
</header>

<div class="content">

  <div class="store-badge">📦 Dateien landen im Store — Admin entscheidet ob sie Live gehen</div>

  <div id="checking" class="state-card">
    <div class="spin-ring"></div>
    <div class="state-sub">Prüfe Zugang…</div>
  </div>

  <div id="no-access" class="state-card blocked">
    <div class="state-icon">🔒</div>
    <div class="state-title" id="no-access-title">Kein Zugang</div>
    <div class="state-sub" id="no-access-sub"></div>
  </div>

  <button id="pick-btn" onclick="pickFiles()">
    <div class="icon">📷</div>
    <div class="label">Foto / Video auswählen</div>
    <div class="sub">Kamera, Fotos oder Dateien</div>
  </button>
  <input type="file" id="file-input" multiple accept="image/*,video/*" style="display:none">

  <div id="progress-section">
    <div class="spin-wrap">
      <div class="spin-ring"></div>
      <div class="spin-emoji">📤</div>
    </div>
    <div class="prog-label" id="prog-label">Wird hochgeladen…</div>
    <div class="prog-file" id="prog-file"></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-count" id="prog-count"></div>
  </div>

  <div id="results"></div>
  <button id="upload-again" onclick="resetUpload()">+ Weitere hochladen</button>

</div>
<div id="toast"></div>

<script>
const REPO     = 'MeierAndre130577/kiosk';
const FOLDER   = 'Sielaff_Store';
const GIST_ID  = 'dddeed1b06e92a5fabd4d49304b3acb2';
const GIST_TOK = ['ghp_drGUxR6ckQoymYRSdSy', 'Lf4eqWNorcq2vXPFA'].join('');

// Credentials come from Gist after code validation
var _cldCloud = '', _cldKey = '', _cldSecret = '';
const gh    = () => localStorage.getItem('gh_token') || '';

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + (type || 'ok');
  setTimeout(function() { t.className = ''; }, 3500);
}

function showBlocked(title, sub) {
  document.getElementById('checking').style.display    = 'none';
  document.getElementById('no-access-title').textContent = title;
  document.getElementById('no-access-sub').textContent   = sub;
  document.getElementById('no-access').style.display   = 'flex';
}

// ── SHA-1 signing ──────────────────────────────────────────
async function sha1(msg) {
  var buf = new TextEncoder().encode(msg);
  var hash = await crypto.subtle.digest('SHA-1', buf);
  return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
}
async function cldSign(params) {
  var str = Object.keys(params).sort()
    .filter(function(k) { return params[k] !== '' && params[k] != null; })
    .map(function(k) { return k + '=' + params[k]; }).join('&');
  return sha1(str + _cldSecret);
}

// ── GitHub API (cache update) ──────────────────────────────
async function ghGet(path) {
  var r = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, {
    headers: { Authorization: 'token ' + gh() }
  });
  return r.json();
}
async function ghPut(path, content, sha, msg) {
  var r = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, {
    method: 'PUT',
    headers: { Authorization: 'token ' + gh(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(content))), sha: sha })
  });
  return r.json();
}

// ── UI ─────────────────────────────────────────────────────
function pickFiles() { document.getElementById('file-input').click(); }

function resetUpload() {
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('results').style.display          = 'none';
  document.getElementById('results').innerHTML              = '';
  document.getElementById('upload-again').style.display     = 'none';
  document.getElementById('prog-fill').style.width          = '0%';
  document.getElementById('pick-btn').style.display         = 'flex';
}

// ── Upload ─────────────────────────────────────────────────
async function uploadFiles(files) {
  if (!files.length) return;

  var progSection = document.getElementById('progress-section');
  var progLabel   = document.getElementById('prog-label');
  var progFile    = document.getElementById('prog-file');
  var progFill    = document.getElementById('prog-fill');
  var progCount   = document.getElementById('prog-count');
  var results     = document.getElementById('results');

  document.getElementById('pick-btn').style.display = 'none';
  progSection.style.display = 'flex';
  results.style.display = 'none';
  results.innerHTML = '';

  var newResources = [], done = 0;

  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    progLabel.textContent = 'Wird hochgeladen…';
    progFile.textContent  = file.name;
    progCount.textContent = (i + 1) + ' von ' + files.length;
    progFill.style.width  = (i / files.length * 100) + '%';

    try {
      var ts = Math.round(Date.now() / 1000);
      var publicId = file.name.replace(/\.[^.]+$/, '');
      var sig = await cldSign({ folder: FOLDER, public_id: publicId, timestamp: ts });
      var form = new FormData();
      form.append('file', file);
      form.append('api_key', _cldKey);
      form.append('timestamp', ts);
      form.append('public_id', publicId);
      form.append('folder', FOLDER);
      form.append('signature', sig);

      var r = await fetch('https://api.cloudinary.com/v1_1/' + _cldCloud + '/auto/upload', { method: 'POST', body: form });
      var d = await r.json();
      if (d.error) throw new Error(d.error.message);

      newResources.push({
        public_id: d.public_id, secure_url: d.secure_url,
        resource_type: d.resource_type, format: d.format,
        bytes: d.bytes, asset_id: d.asset_id || d.public_id,
        kiosk_folder: FOLDER
      });
      done++;

      var kb = Math.round((d.bytes || 0) / 1024);
      var size = kb > 1024 ? (kb / 1024).toFixed(1) + ' MB' : kb + ' KB';
      results.innerHTML += '<div class="result-item ok"><div class="result-icon">' +
        (d.resource_type === 'video' ? '🎬' : '🖼️') +
        '</div><div class="result-info"><div class="result-name">' + file.name + '</div>' +
        '<div class="result-detail">' + size + ' · hochgeladen ✓</div></div></div>';
    } catch(e) {
      results.innerHTML += '<div class="result-item err"><div class="result-icon">⚠️</div>' +
        '<div class="result-info"><div class="result-name">' + file.name + '</div>' +
        '<div class="result-detail">' + (e.message || 'Fehler') + '</div></div></div>';
    }
  }

  progFill.style.width = '100%';
  if (done > 0 && gh()) {
    progLabel.textContent = 'Cache wird gespeichert…';
    progFile.textContent = ''; progCount.textContent = '';
    try {
      var cf = await ghGet('cloudinary-cache.json');
      var cache = JSON.parse(atob(cf.content.replace(/\n/g, '')));
      cache.resources = (cache.resources || []).filter(function(res) {
        return !newResources.find(function(n) { return n.public_id === res.public_id; });
      });
      cache.resources.push.apply(cache.resources, newResources);
      cache.updated = new Date().toISOString();
      await ghPut('cloudinary-cache.json', JSON.stringify(cache, null, 2), cf.sha,
        'Upload: ' + newResources.map(function(r) { return r.public_id; }).join(', '));
    } catch(e) {}
  }

  progSection.style.display = 'none';
  results.style.display = 'flex';
  document.getElementById('upload-again').style.display = '';
  document.getElementById('file-input').value = '';
}

document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files.length) uploadFiles(Array.from(e.target.files));
});

// ── Init ───────────────────────────────────────────────────
(async function() {
  var code = location.hash.slice(1).trim();

  document.getElementById('checking').style.display = 'flex';

  if (!code) {
    showBlocked('Kein Upload-Link', 'Bitte den vollständigen Upload-Link öffnen.');
    return;
  }

  try {
    var r = await fetch('https://api.github.com/gists/' + GIST_ID, {
      headers: { Authorization: 'token ' + GIST_TOK }
    });
    var data = await r.json();
    var f = data.files && data.files['upload-access.json'];
    if (!f || !JSON.parse(f.content).enabled) {
      showBlocked('Upload gesperrt', 'Der Admin hat den Zugang deaktiviert.');
      return;
    }
    var access = JSON.parse(f.content);
    if (access.code !== code) {
      showBlocked('Link ungültig', 'Dieser Link ist nicht mehr aktiv.');
      return;
    }
    _cldCloud  = access.cld_cloud  || 'dqw5qfpe2';
    _cldKey    = access.cld_key    || '';
    _cldSecret = access.cld_secret || '';
    document.getElementById('checking').style.display = 'none';
    document.getElementById('pick-btn').style.display = 'flex';
  } catch(e) {
    showBlocked('Verbindungsfehler', 'Internetverbindung prüfen und Seite neu laden.');
  }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Kiosk</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; background: #000;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  #s-kiosk { position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: #000; }

  #site-frame {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: none; background: #000;
  }
  #site-frame.hidden { display: none; }

  #site-video {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: contain; background: #000; display: none;
  }
  #site-video.show { display: block; }

  #site-image {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: contain; background: #000; display: none;
  }
  #site-image.show { display: block; }

  #frame-loading {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0;
    background: #000; z-index: 4;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  #frame-loading.show { opacity: 1; }
  .spinner {
    width: 38px; height: 38px;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: #00c8ff; border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #video-error {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0;
    background: #111; z-index: 4; display: none;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    color: #888; text-align: center; padding: 24px;
  }
  #video-error.show { display: -webkit-flex; display: flex; }
  #video-error > * + * { margin-top: 10px; }
  #video-error .ve-ico { font-size: 36px; }
  #video-error p { font-size: 14px; line-height: 1.6; max-width: 320px; }
  #video-error small { font-size: 11px; color: #555; word-break: break-all; max-width: 300px; }

  #prog-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,.06); z-index: 5; pointer-events: none; }
  #prog-bar { height: 100%; background: linear-gradient(90deg, #00c8ff, #7c3aed); width: 0%; }
  #site-counter { position: absolute; bottom: 10px; right: 10px; font-size: 11px; color: rgba(255,255,255,.2); z-index: 5; pointer-events: none; font-family: system-ui, sans-serif; }
</style>
</head>
<body>

<div id="s-kiosk">
  <iframe id="site-frame"
    sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"
    allow="autoplay; fullscreen"
    allowfullscreen></iframe>
  <video id="site-video" autoplay muted playsinline></video>
  <img id="site-image" alt="">
  <div id="video-error">
    <div class="ve-ico">⚠️</div>
    <p id="ve-msg">Video kann nicht geladen werden.</p>
    <small id="ve-detail"></small>
    <small id="ve-url"></small>
  </div>
  <div id="frame-loading"><div class="spinner"></div></div>
  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div id="site-counter"></div>
</div>

<script>
/* ES5 – kompatibel mit Safari 9 / iOS 9 */

var GIST_ID    = 'dddeed1b06e92a5fabd4d49304b3acb2';
var GIST_TOKEN = ['ghp_drGUxR6ckQoymYRSdSy', 'Lf4eqWNorcq2vXPFA'].join('');
var DEFAULT_SITES = [
  { type: 'cloudinary', cloudName: 'dqw5qfpe2', tag: 'kiosk', duration: 30, url: '' }
];

/* ── Device-ID ─────────────────────────────────────────── */
function getDeviceId() {
  try {
    var id = localStorage.getItem('kiosk_device_id');
    if (!id) {
      id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
      localStorage.setItem('kiosk_device_id', id);
    }
    return id;
  } catch(e) { return 'unknown-' + Math.random().toString(36).slice(2); }
}
var DEVICE_ID = getDeviceId();

/* ── Browser / OS Erkennung ────────────────────────────── */
function detectBrowser(ua) {
  if (/CriOS/.test(ua))  return 'Chrome iOS';
  if (/FxiOS/.test(ua))  return 'Firefox iOS';
  if (/EdgA/.test(ua))   return 'Edge Android';
  var ch = ua.match(/Chrome\/([\d]+)/);
  if (ch && !/Edge/.test(ua)) return 'Chrome ' + ch[1];
  var ff = ua.match(/Firefox\/([\d]+)/);
  if (ff) return 'Firefox ' + ff[1];
  var sf = ua.match(/Version\/([\d]+)/);
  if (sf && /Safari/.test(ua)) return 'Safari ' + sf[1];
  return 'Unknown';
}
function detectOS(ua) {
  var io = ua.match(/iPhone OS ([\d_]+)/);
  if (io) return 'iOS ' + io[1].replace(/_/g, '.');
  var ip = ua.match(/iPad.*OS ([\d_]+)/);
  if (ip) return 'iPadOS ' + ip[1].replace(/_/g, '.');
  var an = ua.match(/Android ([\d.]+)/);
  if (an) return 'Android ' + an[1];
  if (/Windows NT/.test(ua)) return 'Windows';
  if (/Macintosh/.test(ua))  return 'macOS';
  return navigator.platform || 'Unknown';
}

/* ── XHR Helfer ────────────────────────────────────────── */
function fetchJSON(url) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url);
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); }
      } else { reject(new Error(xhr.status)); }
    };
    xhr.onerror = function() { reject(new Error('network')); };
    xhr.send();
  });
}
function fetchText(url) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url);
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) { resolve(xhr.responseText); }
      else { reject(new Error(xhr.status)); }
    };
    xhr.onerror = function() { reject(new Error('network')); };
    xhr.send();
  });
}
function xhrJSON(method, url, headers, body) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, url);
  for (var h in headers) xhr.setRequestHeader(h, headers[h]);
  xhr.send(body ? JSON.stringify(body) : null);
}

/* ── URL Helfer ────────────────────────────────────────── */
function baseUrl() {
  var b = location.href.split('?')[0];
  if (b.charAt(b.length - 1) !== '/') b += '/';
  return b;
}
function configUrl() { return baseUrl() + 'config.json?t=' + Date.now(); }
function versionUrl() { return baseUrl() + 'version.txt?t=' + Date.now(); }

/* ── Heartbeat ─────────────────────────────────────────── */
var loadedVersion = '';

function sendHeartbeat() {
  var ua = navigator.userAgent;
  var myData = {
    id:       DEVICE_ID,
    lastSeen: new Date().toISOString(),
    browser:  detectBrowser(ua),
    os:       detectOS(ua),
    screen:   window.screen.width + 'x' + window.screen.height,
    version:  loadedVersion
  };
  var gistUrl = 'https://api.github.com/gists/' + GIST_ID;
  var auth = { 'Authorization': 'token ' + GIST_TOKEN, 'Content-Type': 'application/json' };
  var xhr = new XMLHttpRequest();
  xhr.open('GET', gistUrl);
  xhr.setRequestHeader('Authorization', 'token ' + GIST_TOKEN);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      var current = {};
      try { current = JSON.parse(d.files['heartbeat.json'].content); } catch(e) {}
      if (current[DEVICE_ID] && current[DEVICE_ID].name) myData.name = current[DEVICE_ID].name;
      current[DEVICE_ID] = myData;
      xhrJSON('PATCH', gistUrl, auth, { files: { 'heartbeat.json': { content: JSON.stringify(current, null, 2) } } });
    } catch(e) {
      var fresh = {};
      fresh[DEVICE_ID] = myData;
      xhrJSON('PATCH', gistUrl, auth, { files: { 'heartbeat.json': { content: JSON.stringify(fresh, null, 2) } } });
    }
  };
  xhr.onerror = function() {};
  xhr.send();
}

/* ── DOM ───────────────────────────────────────────────── */
var frame      = document.getElementById('site-frame');
var video      = document.getElementById('site-video');
var img        = document.getElementById('site-image');
var videoError = document.getElementById('video-error');
var loading    = document.getElementById('frame-loading');
var progBar    = document.getElementById('prog-bar');
var counter    = document.getElementById('site-counter');

/* ── State ─────────────────────────────────────────────── */
var sites       = [];
var activeSites = [];
var curIdx      = 0;
var rotTimer    = null;
var rafId       = null;
var wakeLock    = null;
var running     = false;

/* ── Wake Lock ─────────────────────────────────────────── */
function grabWake() {
  if (!('wakeLock' in navigator)) return;
  navigator.wakeLock.request('screen').then(function(wl) {
    wakeLock = wl;
    wl.addEventListener('release', function() { wakeLock = null; });
  }).catch(function() {});
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && !wakeLock && running) grabWake();
});

/* ── Vollbild ───────────────────────────────────────────── */
function goFull() {
  var el  = document.documentElement;
  var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
  if (req) { try { var p = req.call(el); if (p && p['catch']) p['catch'](function(){}); } catch(e) {} }
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(function(ev) {
  document.addEventListener(ev, function() {
    var active = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
    if (!active && running) goFull();
  });
});

history.pushState(null, '', location.href);
window.addEventListener('popstate', function() { history.pushState(null, '', location.href); });
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

/* ── Fit-Modus ─────────────────────────────────────────── */
function setFit(mode) {
  video.style.objectFit = mode;
  img.style.objectFit   = mode;
}

/* ── YouTube / Vimeo Embed ─────────────────────────────── */
function resolveWebUrl(url) {
  var yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
  if (yt) return 'https://www.youtube-nocookie.com/embed/' + yt[1] + '?autoplay=1&mute=1&loop=1&playlist=' + yt[1] + '&controls=0&disablekb=1';
  var vi = url.match(/vimeo\.com\/(\d+)/);
  if (vi) return 'https://player.vimeo.com/video/' + vi[1] + '?autoplay=1&muted=1&loop=1&background=1';
  return url;
}

/* ── Cloudinary expandieren (via cloudinary-cache.json) ── */
function expandSites(list) {
  var result = [];
  var promises = [];
  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    if (s.type === 'cloudinary' && s.cloudName) {
      (function(cn, dur) {
        var url = baseUrl() + 'cloudinary-cache.json?t=' + Date.now();
        promises.push(fetchJSON(url).then(function(data) {
          var res = data.resources || [];
          for (var r = 0; r < res.length; r++) {
            var item = res[r];
            if (item.kiosk_folder !== 'Sielaff_Live') continue;
            var kind = item.resource_type === 'video' ? 'video' : 'image';
            var transform = kind === 'video' ? 'f_mp4,vc_h264/' : '';
            var ext = kind === 'video' ? 'mp4' : (item.format || 'jpg');
            result.push({
              type: kind,
              url: 'https://res.cloudinary.com/' + cn + '/' + kind + '/upload/' + transform + item.public_id + '.' + ext,
              duration: dur
            });
          }
        }).catch(function() {}));
      })(s.cloudName, s.duration || 30);
    } else {
      result.push(s);
    }
  }
  return Promise.all(promises).then(function() { return result; });
}

/* ── Version check ─────────────────────────────────────── */
fetchText(versionUrl()).then(function(t) { loadedVersion = t.trim(); }).catch(function() {});

function checkVersion() {
  fetchText(versionUrl()).then(function(t) {
    if (loadedVersion && t.trim() !== loadedVersion) { location.reload(); }
  }).catch(function() {});
}

/* ── Config neu laden ──────────────────────────────────── */
function reloadConfig(callback) {
  fetchJSON(configUrl()).then(function(cfg) {
    var dflt   = cfg['default'] || cfg;
    var devCfg = (cfg.devices && cfg.devices[DEVICE_ID]) || null;
    var newSites = (devCfg && devCfg.sites && devCfg.sites.length) ? devCfg.sites : (dflt.sites || []);
    var newFit   = (devCfg && devCfg.fit) ? devCfg.fit : (dflt.fit || 'contain');
    sites = newSites.length ? newSites : DEFAULT_SITES.slice();
    setFit(newFit);
    callback();
  }).catch(function() { callback(); });
}

/* ── Kiosk starten ─────────────────────────────────────── */
function startKiosk() {
  expandSites(sites).then(function(expanded) {
    activeSites = expanded.length ? expanded : [];
    if (activeSites.length === 0) {
      loading.classList.remove('show');
      return;
    }
    running = true; curIdx = 0; goFull(); grabWake(); showSite(0);
  });
}

/* ── Navigation ────────────────────────────────────────── */
function nextSite() {
  var next = (curIdx + 1) % activeSites.length;
  if (next === 0) {
    checkVersion();
    reloadConfig(function() {
      expandSites(sites).then(function(fresh) {
        if (fresh.length > 0) activeSites = fresh;
        showSite(0);
      });
    });
  } else {
    showSite(next);
  }
}

function showSite(idx) {
  curIdx = idx;
  var s = activeSites[idx];
  clearTimeout(rotTimer); cancelAnimationFrame(rafId);
  video.onended = null; video.pause(); video.removeAttribute('src');
  video.classList.remove('show');
  img.classList.remove('show'); img.src = '';
  videoError.classList.remove('show');
  frame.classList.add('hidden');
  counter.textContent = activeSites.length > 1 ? (idx + 1) + ' / ' + activeSites.length : '';

  if (s.type === 'video') {
    loading.classList.remove('show');
    video.muted = true; video.loop = false; video.src = s.url;
    video.classList.add('show'); video.load();
    var vp = video.play(); if (vp && vp['catch']) vp['catch'](function(){});
    var minDur = (s.duration || 30) * 1000;
    var vidStart = Date.now();
    startVideoProgress();
    video.onended = function() {
      var elapsed = Date.now() - vidStart;
      if (elapsed < minDur) {
        video.currentTime = 0;
        video.play();
      } else {
        nextSite();
      }
    };

  } else if (s.type === 'image') {
    loading.classList.add('show');
    img.src = s.url; img.classList.add('show');
    startProgress(s.duration || 30);
    rotTimer = setTimeout(nextSite, (s.duration || 30) * 1000);

  } else {
    frame.classList.remove('hidden'); loading.classList.add('show');
    frame.src = resolveWebUrl(s.url);
    startProgress(s.duration || 30);
    rotTimer = setTimeout(nextSite, (s.duration || 30) * 1000);
  }
}

/* ── Fortschrittsbalken ────────────────────────────────── */
function startProgress(durationSec) {
  cancelAnimationFrame(rafId);
  var start = Date.now(), totalMs = durationSec * 1000;
  progBar.style.width = '0%';
  function tick() {
    progBar.style.width = Math.min((Date.now() - start) / totalMs * 100, 100) + '%';
    if ((Date.now() - start) < totalMs) rafId = requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function startVideoProgress() {
  cancelAnimationFrame(rafId);
  progBar.style.width = '0%';
  function tick() {
    if (video.duration && video.duration > 0) {
      progBar.style.width = (video.currentTime / video.duration * 100) + '%';
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

/* ── Lade-Events ───────────────────────────────────────── */
frame.addEventListener('load',  function() { loading.classList.remove('show'); });
img.addEventListener('load',    function() { loading.classList.remove('show'); });
img.addEventListener('error',   function() { loading.classList.remove('show'); });

video.addEventListener('error', function() {
  video.classList.remove('show');
  var msg = 'Video kann nicht geladen werden.';
  var detail = 'Weiter zum nächsten Inhalt…';
  var err = video.error;
  if (err) {
    if (err.code === 1) { msg = 'Wiedergabe abgebrochen.'; detail = 'Laden wurde unterbrochen (Code 1).'; }
    else if (err.code === 2) { msg = 'Netzwerkfehler.'; detail = 'Video konnte nicht heruntergeladen werden. WLAN prüfen.'; }
    else if (err.code === 3) { msg = 'Format nicht unterstützt.'; detail = 'Gerät kann dieses Videoformat nicht dekodieren (Code 3).'; }
    else if (err.code === 4) { msg = 'Quelle nicht erreichbar.'; detail = 'Video-URL nicht verfügbar oder Format abgelehnt (Code 4).'; }
    else { detail = 'Fehler Code ' + err.code + ': ' + (err.message || ''); }
  }
  document.getElementById('ve-msg').textContent    = msg;
  document.getElementById('ve-detail').textContent = detail;
  document.getElementById('ve-url').textContent    = video.src || '';
  videoError.classList.add('show');
  if (running) setTimeout(nextSite, 5000);
});

/* ── Online-Wiederherstellung ──────────────────────────── */
window.addEventListener('online', function() {
  if (!running) return;
  reloadConfig(function() {
    expandSites(sites).then(function(fresh) {
      if (fresh.length > 0) activeSites = fresh;
      showSite(curIdx < activeSites.length ? curIdx : 0);
    });
  });
});

/* ── 3:00 Reload ───────────────────────────────────────── */
setInterval(function() {
  var n = new Date();
  if (n.getHours() === 3 && n.getMinutes() === 0) location.reload();
}, 60000);

/* ── Heartbeat alle 5 Minuten ──────────────────────────── */
sendHeartbeat();
setInterval(sendHeartbeat, 5 * 60 * 1000);

/* ── Init ──────────────────────────────────────────────── */
loading.classList.add('show');
reloadConfig(function() { startKiosk(); });
</script>
</body>
</html>
